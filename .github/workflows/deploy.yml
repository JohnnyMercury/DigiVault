name: Deploy DigiVault

on:
  push:
    branches: [ main, master ]

concurrency:
  group: deploy
  cancel-in-progress: true

# Production server (SERVER_HOST = 145.223.90.75) drops SSH from arbitrary
# public IPs — only a small allow-list (the cyborg-games box at 104.207.66.247)
# can hit port 22. So we route every SSH through that allow-listed host as a
# jump box (PROXY_*) and treat SERVER_* as the final destination only the
# proxy can reach. If the firewall ever opens up again, drop the proxy_*
# fields and the action behaves as before.
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        id: deploy
        continue-on-error: true
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_password: ${{ secrets.PROXY_PASSWORD }}
          timeout: 60s
          command_timeout: 20m
          script: |
            cd /var/www/digivault
            git checkout -- . && git pull origin main
            docker build --no-cache --network=host -t digivault:latest -f src/DigiVault.Web/Dockerfile .
            docker compose -f docker-compose.prod.yml stop web
            docker compose -f docker-compose.prod.yml up -d web
            docker compose -f docker-compose.prod.yml ps
            docker image prune -f

      - name: Retry deploy on failure
        if: steps.deploy.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_password: ${{ secrets.PROXY_PASSWORD }}
          timeout: 120s
          command_timeout: 20m
          script: |
            cd /var/www/digivault
            git checkout -- . && git pull origin main
            docker build --no-cache --network=host -t digivault:latest -f src/DigiVault.Web/Dockerfile .
            docker compose -f docker-compose.prod.yml stop web
            docker compose -f docker-compose.prod.yml up -d web
            docker compose -f docker-compose.prod.yml ps
            docker image prune -f
